<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Roots - Product Tiers</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="video-container">
        <!-- Using the template video as background -->
        <video id="bg-video" autoplay muted playsinline>
            <source src="assets/videos/template_blank_tiers.mp4" type="video/mp4">
        </video>
    </div>

    <div id="app-content" class="hidden">
        <!-- Content overlaid on the video -->
    </div>

    <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
